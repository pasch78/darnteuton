<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darn Wortler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Darn Wortler</h1>
    </header>

    <div id="hud" class="hidden">
        <div id="timer">05:00</div>
        <div id="score-wrapper">
            <div id="score-total-display">Total: 0</div>
            <div id="score-breakdown-display">Base: 0 | Bonus: 0</div>
        </div>
    </div>
    
    <main id="phase1-container">
        <div id="wordle-grid"></div>
        <div id="keyboard-visual"></div>
        <button id="skip-phase1-btn" style="width: 100%; background-color: var(--col5);">Reveal & Skip to Phase 2</button>
    </main>

    <div id="transition-overlay" class="hidden">
        <h2>Phase 2 Unlocked!</h2>
        <p>Find the horizontal words. Duplicate rows share a pool.</p>
        <button id="start-timer-btn">Start 5-Minute Timer</button>
    </div>

    <main id="phase2-container" class="hidden">
        <div id="board-area">
            <div id="phase2-board"></div> 
        </div>

        <div id="input-zone">
            <input type="text" id="omni-box" placeholder="Type a word..." maxlength="5" autocomplete="off" disabled>
            <div id="action-notification" class="hidden"></div>
        </div>

        <div id="found-words-container"></div>
        
        <button id="dev-end-phase2-btn" style="width: 100%; background-color: var(--col5); margin-top: 2rem;">Dev Cheat: End Phase 2 Now</button>

        <div id="game-over-section" class="hidden">
            <h2>Time's Up!</h2>
            <h3 id="final-score">Total Score: 0</h3>
            <h4 id="final-score-breakdown">Base: 0 | Bonus: 0</h4>
            
            <div id="all-solutions-area">
                <h4>All Possible Solutions:</h4>
                <p class="legend"><span style="text-decoration: line-through; opacity: 0.6;">Strikethrough</span> = Found | <span>✨ Italic Gold</span> = Rare Word Bonus</p>
                <div id="all-solutions-list"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
