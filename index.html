<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darn Teuton! You Betcha.</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f6f0e2; /* Matches the warm vintage cream frame of the image */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .cover-container { 
            text-align: center; 
            max-width: 95%; 
            max-height: 95%; 
        }
        img { 
            max-width: 100%; 
            max-height: 90vh; 
            border-radius: 4px; 
            /* A soft shadow keeps the image crisp while letting the borders blend seamlessly */
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
        }
    </style>
</head>
<body>
    <div class="cover-container">
        <img src="darnteuton.png" alt="Lederhosen Lawman">
    </div>
</body>
</html>
